name: CI
on: [push, pull_request]
jobs:
  generate-dockerfile-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v7
      - run: |
          MATRIX_JSON=$(ls Dockerfile.* | jq -R -s -c 'split("\n")[:-1]')
          echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"
  test:
    runs-on: ubuntu-latest
    needs: generate-dockerfile-matrix
    strategy:
      matrix:
        dockerfile: ${{ fromJson(needs.generate-dockerfile-matrix.outputs.matrix) }}
    steps:
    - uses: actions/checkout@v7
    - run: ./.hack/test.sh ${{ matrix.dockerfile }}
